<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dojo Kazoku - Gestión de Combate</title>
    <style>
        :root {
            --aka: #cc0000;
            --ao: #1976d2;
            --bg: #121212;
            --surface: #1e1e1e;
            --header-bg: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            background: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .app-container { display: flex; flex-direction: column; height: 100%; }

        /* HEADER */
        .navbar {
            height: 55px;
            background: var(--header-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--aka); flex-shrink: 0;
            position: relative;
        }
        .nav-actions {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            display: flex; gap: 6px;
        }
        .nav-actions button {
            background: #222; border: 1px solid #444; color: #ddd;
            width: 34px; height: 34px; border-radius: 6px;
            font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .nav-actions button.active { background: var(--aka); color: white; border-color: var(--aka); }

        .dojo-brand { display: flex; align-items: center; gap: 8px; }
        .dojo-logo { height: 38px; width: 38px; border-radius: 50%; object-fit: cover; border: 1px solid var(--aka); }
        .dojo-title { font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .dojo-subtitle { font-size: 0.55rem; color: var(--aka); font-weight: bold; margin-top: -2px; letter-spacing: 2px; }

        /* NAVEGACIÓN */
        .nav-tabs { display: flex; background: #222; flex-shrink: 0; }
        .nav-btn { flex:1; background: none; border: none; color: #777; padding: 8px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: white; background: var(--aka); }

        /* CONTENIDO */
        .content { flex-grow: 1; overflow: hidden; }
        .page { display: none; height: 100%; width: 100%; }
        .page.active { display: flex; }

        .board {
            display: grid;
            grid-template-columns: 1fr minmax(240px, 22vw) 1fr;
            width: 100%; height: 100%;
        }

        /* LATERALES (AKA / AO) */
        .side {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 10px;
            position: relative;
        }

        .senshu {
            position: absolute;
            top: clamp(8px, 1.2vmin, 18px);
            width: clamp(28px, 4vmin, 70px); height: clamp(28px, 4vmin, 70px);
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(0.6rem, 1.6vmin, 1.6rem); font-weight: 900;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
        }
        .senshu.active {
            background: #ffeb3b;
            border-color: #ffeb3b;
            color: #000;
            box-shadow: 0 0 12px rgba(255,235,59,0.8);
        }
        .aka .senshu { right: 8px; }
        .ao .senshu { left: 8px; }

        .faults {
            display: flex; gap: 6px;
            margin-top: 8px;
        }
        .fault {
            width: clamp(22px, 3vmin, 50px); height: clamp(22px, 3vmin, 50px);
            border-radius: 50%;
            background: rgba(0,0,0,0.35);
            border: 2px solid rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.15s;
        }
        .fault[data-lvl="1"].active { background: #ffeb3b; border-color: #ffeb3b; box-shadow: 0 0 8px rgba(255,235,59,0.7); }
        .fault[data-lvl="2"].active { background: #ff9800; border-color: #ff9800; box-shadow: 0 0 8px rgba(255,152,0,0.7); }
        .fault[data-lvl="3"].active { background: #f44336; border-color: #f44336; box-shadow: 0 0 8px rgba(244,67,54,0.7); }
        .fault[data-lvl="4"].active { background: #7b0000; border-color: #ff1744; box-shadow: 0 0 10px rgba(255,23,68,0.8); }
        .fault[data-lvl="5"].active { background: #000; border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.9); }
        .aka { background: linear-gradient(135deg, #880000 0%, #cc0000 100%); }
        .ao { background: linear-gradient(135deg, #0d47a1 0%, #1976d2 100%); }

        .score-val {
            font-size: min(clamp(4rem, 32vmin, 24rem), 38vh);
            font-weight: 900; line-height: 0.8;
            margin-bottom: 15px;
        }

        .btn-group {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 0.5vmin; width: 100%; max-width: clamp(240px, 30vmin, 520px);
        }

        .btn-p {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white; border-radius: 6px;
            padding: clamp(8px, 2.5vmin, 26px) 2px;
            font-weight: 800; font-size: clamp(1rem, 2.2vmin, 2rem); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        }
        .btn-p small { font-size: clamp(0.55rem, 1.1vmin, 1rem); font-weight: 700; opacity: 0.75; letter-spacing: 0.5px; }
        .btn-p:active { background: white; color: black; }

        /* PANEL CENTRAL */
        .center-panel {
            background: #181818;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-around;
            border-left: 1px solid #333; border-right: 1px solid #333;
            padding: 5px;
        }

        .time-presets { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 4px; 
            width: 90%; 
        }
        .btn-preset {
            background: #333; border: 1px solid #444; color: white;
            padding: clamp(6px, 1.2vmin, 14px) 0; border-radius: 4px;
            font-size: clamp(0.65rem, 1.4vmin, 1.2rem); font-weight: bold; cursor: pointer;
        }
        .btn-preset:active { background: var(--aka); }

        #timer {
            font-size: min(7rem, 18cqw, 10vmin);
            font-family: 'Courier New', monospace; font-weight: 900;
            background: #000; padding: 0.5em 0.6em; border-radius: 8px; border: 1px solid #333;
            line-height: 1; white-space: nowrap;
        }
        .center-panel { container-type: inline-size; }

        .timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 90%; }
        .progress-bar {
            position: relative;
            width: 100%; height: clamp(6px, 1vmin, 12px);
            background: linear-gradient(90deg, var(--aka), #ffeb3b 40%, #4caf50);
            border: 1px solid #333; border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute; top: 0; right: 0; bottom: 0;
            width: 0%;
            background: #000;
            transition: width 0.3s linear;
        }

        .btn-main {
            width: 90%; padding: clamp(10px, 2vmin, 22px); border-radius: 6px;
            border: none; background: var(--aka); color: white;
            font-weight: 900; font-size: clamp(1rem, 2.2vmin, 2rem); cursor: pointer;
        }

        .flags-box { display: flex; gap: 12px; }
        .flag { width: 38px; height: 28px; border: 2px solid #444; border-radius: 3px; opacity: 0.2; cursor: pointer; }
        .flag.red { background: #ff0000; }
        .flag.white { background: #ffffff; }
        .flag.active { opacity: 1; border-color: #ffeb3b; box-shadow: 0 0 10px rgba(255,235,59,0.5); }

        .side { overflow: hidden; min-height: 0; }

        /* HORIZONTAL CORTO (móvil landscape) */
        @media (orientation: landscape) and (max-height: 500px) {
            .score-val { font-size: min(22vh, 18vmin); margin-bottom: 4px; }
            .btn-p { padding: 4px 2px; font-size: 0.85rem; }
            .btn-p small { font-size: 0.5rem; }
            .faults { margin-top: 4px; gap: 4px; }
            .fault { width: 18px; height: 18px; }
            .senshu { width: 24px; height: 24px; font-size: 0.55rem; top: 4px; }
            .btn-group { max-width: 200px; gap: 4px; }
            .center-panel { padding: 2px; justify-content: space-between; gap: 2px; }
            .center-panel { overflow-y: auto; }
            .btn-preset { padding: 3px 0; font-size: 0.55rem; }
            .btn-main { padding: 6px; font-size: 0.85rem; }
            #timer { font-size: min(5rem, 14cqw, 8vh); padding: 0.25em 0.5em; }
            .progress-bar { height: 5px; }
            .flags-box { gap: 6px; }
            .flag { width: 26px; height: 18px; }
        }

        /* MODO VERTICAL */
        @media (max-width: 768px) and (orientation: portrait) {
            .board { grid-template-columns: 1fr; grid-template-rows: auto 1fr 1fr; }
            .center-panel { grid-row: 1; flex-direction: row; flex-wrap: wrap; height: auto; gap: 5px; }
            .time-presets { width: 48%; order: 1; }
            .timer-wrap { width: 48%; order: 2; gap: 4px; }
            #timer { width: auto; font-size: 2rem; padding: 0.3em 0.5em; }
            .btn-main { width: 100%; order: 3; margin-top: 2px; padding: 8px; font-size: 1rem; }
            .side { flex-direction: row; justify-content: space-around; }
            .score-val { font-size: 5rem; margin: 0; }
            .btn-group { grid-template-columns: repeat(4, 1fr); width: auto; }
            .flags-box { display: none; }
            .aka .senshu, .ao .senshu { left: 8px; right: auto; }
            .side { flex-wrap: wrap; align-items: center; }
            .faults { width: 100%; justify-content: center; order: 99; margin-top: 4px; }
        }
    </style>
</head>

66Z9pneZjLYf/9k="><div><h1 class="dojo-title">DOJO KAZOKU</h1><div class="dojo-subtitle">KEN SHIN KAN</div></div></div>
            <div class="nav-actions">
                <button id="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
            </div>
        </header>

        <div class="nav-tabs">
            <button class="nav-btn active" onclick="nav('board')" id="b-board">COMBATE</button>
            <button class="nav-btn" onclick="nav('history')" id="b-history">HISTORIAL</button>
        </div>

        <main class="content">
            <div id="page-board" class="page active">
                <div class="board">
                    <div class="side aka">
                        <div class="senshu" id="senshu-aka" onclick="toggleSenshu('aka')" title="Senshu">S</div>
                        <span style="font-weight: 900; font-size: clamp(0.8rem, 1.8vmin, 1.8rem); letter-spacing: 1px;">AKA</span>
                        <div class="score-val" id="s-aka">0</div>
                        <div class="btn-group">
                            <button class="btn-p" onclick="updateP('aka', 1)">+1<small>YUKO</small></button>
                            <button class="btn-p" onclick="updateP('aka', 2)">+2<small>WAZA-ARI</small></button>
                            <button class="btn-p" onclick="updateP('aka', 3)">+3<small>IPPON</small></button>
                            <button class="btn-p" onclick="updateP('aka', -1)" style="font-size: 0.6rem; opacity: 0.6;">-1</button>
                        </div>
                        <div class="faults" id="f-aka">
                            <div class="fault" data-lvl="1" title="Chukoku" onclick="setFault('aka',1)"></div>
                            <div class="fault" data-lvl="2" title="Keikoku" onclick="setFault('aka',2)"></div>
                            <div class="fault" data-lvl="3" title="Hansoku-Chui" onclick="setFault('aka',3)"></div>
                            <div class="fault" data-lvl="4" title="Hansoku" onclick="setFault('aka',4)"></div>
                            <div class="fault" data-lvl="5" title="Shikkaku" onclick="setFault('aka',5)"></div>
                        </div>
                    </div>

                    <div class="center-panel">
                        <div class="time-presets">
                            <button class="btn-preset" onclick="setT(60)">1:00</button>
                            <button class="btn-preset" onclick="setT(90)">1:30</button>
                            <button class="btn-preset" onclick="setT(120)">2:00</button>
                            <button class="btn-preset" onclick="setT(180)">3:00</button>
                        </div>

                        <div class="timer-wrap">
                            <div id="timer">02:00</div>
                            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
                        </div>
                        
                        <button class="btn-main" id="t-ctrl" onclick="toggleTimer()">START</button>

                        <div class="flags-box">
                            <div class="flag red" onclick="this.classList.toggle('active')"></div>
                            <div class="flag white" onclick="this.classList.toggle('active')"></div>
                        </div>

                        <button onclick="resetMatch()" style="background:none; border:none; color:#444; font-size:0.6rem; text-decoration: underline; cursor:pointer;">RESETEAR PELEA</button>
                    </div>

                    <div class="side ao">
                        <div class="senshu" id="senshu-ao" onclick="toggleSenshu('ao')" title="Senshu">S</div>
                        <span style="font-weight: 900; font-size: clamp(0.8rem, 1.8vmin, 1.8rem); letter-spacing: 1px;">AO</span>
                        <div class="score-val" id="s-ao">0</div>
                        <div class="btn-group">
                            <button class="btn-p" onclick="updateP('ao', 1)">+1<small>YUKO</small></button>
                            <button class="btn-p" onclick="updateP('ao', 2)">+2<small>WAZA-ARI</small></button>
                            <button class="btn-p" onclick="updateP('ao', 3)">+3<small>IPPON</small></button>
                            <button class="btn-p" onclick="updateP('ao', -1)" style="font-size: 0.6rem; opacity: 0.6;">-1</button>
                        </div>
                        <div class="faults" id="f-ao">
                            <div class="fault" data-lvl="1" title="Chukoku" onclick="setFault('ao',1)"></div>
                            <div class="fault" data-lvl="2" title="Keikoku" onclick="setFault('ao',2)"></div>
                            <div class="fault" data-lvl="3" title="Hansoku-Chui" onclick="setFault('ao',3)"></div>
                            <div class="fault" data-lvl="4" title="Hansoku" onclick="setFault('ao',4)"></div>
                            <div class="fault" data-lvl="5" title="Shikkaku" onclick="setFault('ao',5)"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-history" class="page">
                <div id="h-list" style="padding: 15px; overflow-y: auto; width: 100%;"></div>
            </div>
        </main>
    </div>

    <script>
        let scores = { aka: 0, ao: 0 };
        let timeLeft = 120;
        let timeTotal = 120;
        let timerRunning = false;
        let interval = null;

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('b-'+p).classList.add('active');
            if(p === 'history') renderHistory();
        }

        function updateP(s, v) {
            scores[s] = Math.max(0, scores[s] + v);
            document.getElementById('s-'+s).textContent = scores[s];
        }

        function setT(s) {
            if(timerRunning) toggleTimer();
            timeLeft = s;
            timeTotal = s;
            renderTime();
        }

        function toggleTimer() {
            const btn = document.getElementById('t-ctrl');
            if(timerRunning) {
                clearInterval(interval);
                btn.textContent = "START";
                btn.style.background = "var(--aka)";
            } else {
                if(timeLeft <= 0) return;
                btn.textContent = "STOP";
                btn.style.background = "#555";
                interval = setInterval(() => {
                    timeLeft--;
                    renderTime();
                    if(timeLeft <= 0) {
                        clearInterval(interval);
                        saveMatch();
                        timerRunning = false;
                        btn.textContent = "START";
                        btn.style.background = "var(--aka)";
                        alert("¡TIEMPO!");
                    }
                }, 1000);
            }
            timerRunning = !timerRunning;
        }

        function renderTime() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
            const s = (timeLeft % 60).toString().padStart(2,'0');
            document.getElementById('timer').textContent = `${m}:${s}`;
            const pct = timeTotal > 0 ? Math.max(0, (timeLeft / timeTotal) * 100) : 0;
            document.getElementById('progress').style.width = (100 - pct) + '%';
        }

        function saveMatch() {
            const h = JSON.parse(localStorage.getItem('kazoku_final_log') || "[]");
            h.unshift({ t: new Date().toLocaleTimeString(), aka: scores.aka, ao: scores.ao });
            localStorage.setItem('kazoku_final_log', JSON.stringify(h));
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('kazoku_final_log') || "[]");
            document.getElementById('h-list').innerHTML = h.map(m => `
                <div style="background:#222; padding:12px; margin-bottom:8px; border-left:5px solid var(--aka); display:flex; justify-content:space-between; border-radius:4px;">
                    <span style="color:#888; font-size:0.8rem;">${m.t}</span>
                    <b style="font-size:1.1rem;">AKA ${m.aka} - AO ${m.ao}</b>
                </div>
            `).join('') || '<p style="text-align:center; color:#555;">No hay registros aún.</p>';
        }

        function resetMatch() {
            if(confirm("¿Reiniciar tablero para una nueva pelea?")) {
                if(scores.aka > 0 || scores.ao > 0) saveMatch();
                scores = {aka:0, ao:0};
                document.getElementById('s-aka').textContent = 0;
                document.getElementById('s-ao').textContent = 0;
                document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
                document.querySelectorAll('.senshu').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.fault').forEach(f => f.classList.remove('active'));
                ['f-aka','f-ao'].forEach(id => document.getElementById(id).dataset.lvl = '0');
            }
        }

        function setFault(side, lvl) {
            const dots = document.querySelectorAll('#f-'+side+' .fault');
            const current = parseInt(document.getElementById('f-'+side).dataset.lvl || '0');
            const next = (current === lvl) ? lvl - 1 : lvl;
            document.getElementById('f-'+side).dataset.lvl = next;
            dots.forEach(d => {
                const dl = parseInt(d.dataset.lvl);
                d.classList.toggle('active', dl <= next);
            });
        }

        function toggleFullscreen() {
            const btn = document.getElementById('btn-fullscreen');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(() => {});
                    }
                    btn.classList.add('active');
                }).catch(() => {});
            } else {
                document.exitFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.unlock) {
                        try { screen.orientation.unlock(); } catch(e) {}
                    }
                    btn.classList.remove('active');
                });
            }
        }

        document.addEventListener('fullscreenchange', () => {
            document.getElementById('btn-fullscreen').classList.toggle('active', !!document.fullscreenElement);
        });

function toggleSenshu(side) {
            const el = document.getElementById('senshu-'+side);
            const other = document.getElementById('senshu-'+(side === 'aka' ? 'ao' : 'aka'));
            if(el.classList.contains('active')) {
                el.classList.remove('active');
            } else {
                el.classList.add('active');
                other.classList.remove('active');
            }
        }
    </script>
</body>
</html>
