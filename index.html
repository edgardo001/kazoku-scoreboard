<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dojo Kazoku - Gestión de Combate</title>
    <style>
        :root {
            --aka: #cc0000;
            --ao: #1976d2;
            --bg: #121212;
            --surface: #1e1e1e;
            --header-bg: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            background: var(--bg); color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .app-container { display: flex; flex-direction: column; height: 100%; }

        /* HEADER */
        .navbar {
            height: 55px;
            background: var(--header-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--aka); flex-shrink: 0;
            position: relative;
        }
        .nav-actions {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            display: flex; gap: 6px;
        }
        .nav-actions button {
            background: #222; border: 1px solid #444; color: #ddd;
            width: 34px; height: 34px; border-radius: 6px;
            font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .nav-actions button.active { background: var(--aka); color: white; border-color: var(--aka); }

        .dojo-brand { display: flex; align-items: center; gap: 8px; }
        .dojo-logo { height: 38px; width: 38px; border-radius: 50%; object-fit: cover; border: 1px solid var(--aka); }
        .dojo-title { font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .dojo-subtitle { font-size: 0.55rem; color: var(--aka); font-weight: bold; margin-top: -2px; letter-spacing: 2px; }

        /* NAVEGACIÓN */
        .nav-tabs { display: flex; background: #222; flex-shrink: 0; }
        .nav-btn { flex:1; background: none; border: none; color: #777; padding: 8px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: white; background: var(--aka); }

        /* CONTENIDO */
        .content { flex-grow: 1; overflow: hidden; }
        .page { display: none; height: 100%; width: 100%; }
        .page.active { display: flex; }

        .board {
            display: grid;
            grid-template-columns: 1fr minmax(240px, 22vw) 1fr;
            width: 100%; height: 100%;
        }

        /* LATERALES (AKA / AO) */
        .side {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 10px;
            position: relative;
        }

        .senshu {
            position: absolute;
            top: clamp(8px, 1.2vmin, 18px);
            width: clamp(28px, 4vmin, 70px); height: clamp(28px, 4vmin, 70px);
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(0.6rem, 1.6vmin, 1.6rem); font-weight: 900;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
        }
        .senshu.active {
            background: #ffeb3b;
            border-color: #ffeb3b;
            color: #000;
            box-shadow: 0 0 12px rgba(255,235,59,0.8);
        }
        .aka .senshu { right: 8px; }
        .ao .senshu { left: 8px; }
        .board.swapped .aka .senshu { right: auto; left: 8px; }
        .board.swapped .ao .senshu { left: auto; right: 8px; }

        .faults {
            display: flex; gap: 6px;
            margin-top: 8px;
        }
        .fault {
            width: clamp(22px, 3vmin, 50px); height: clamp(22px, 3vmin, 50px);
            border-radius: 50%;
            background: rgba(0,0,0,0.35);
            border: 2px solid rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.15s;
        }
        .fault[data-lvl="1"].active { background: #ffeb3b; border-color: #ffeb3b; box-shadow: 0 0 8px rgba(255,235,59,0.7); }
        .fault[data-lvl="2"].active { background: #ff9800; border-color: #ff9800; box-shadow: 0 0 8px rgba(255,152,0,0.7); }
        .fault[data-lvl="3"].active { background: #f44336; border-color: #f44336; box-shadow: 0 0 8px rgba(244,67,54,0.7); }
        .fault[data-lvl="4"].active { background: #7b0000; border-color: #ff1744; box-shadow: 0 0 10px rgba(255,23,68,0.8); }
        .fault[data-lvl="5"].active { background: #000; border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.9); }
        .aka { background: linear-gradient(135deg, #880000 0%, #cc0000 100%); }
        .ao { background: linear-gradient(135deg, #0d47a1 0%, #1976d2 100%); }

        .score-val {
            font-size: min(clamp(4rem, 32vmin, 24rem), 38vh);
            font-weight: 900; line-height: 0.8;
            margin-bottom: 15px;
        }

        .btn-group {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 0.5vmin; width: 100%; max-width: clamp(240px, 30vmin, 520px);
        }

        .btn-p {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white; border-radius: 6px;
            padding: clamp(8px, 2.5vmin, 26px) 2px;
            font-weight: 800; font-size: clamp(1rem, 2.2vmin, 2rem); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        }
        .btn-p small { font-size: clamp(0.55rem, 1.1vmin, 1rem); font-weight: 700; opacity: 0.75; letter-spacing: 0.5px; }
        .btn-p:active { background: white; color: black; }

        /* PANEL CENTRAL */
        .center-panel {
            background: #181818;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-around;
            border-left: 1px solid #333; border-right: 1px solid #333;
            padding: 5px;
        }

        .time-presets { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 4px; 
            width: 90%; 
        }
        .btn-preset {
            background: #333; border: 1px solid #444; color: white;
            padding: clamp(6px, 1.2vmin, 14px) 0; border-radius: 4px;
            font-size: clamp(0.65rem, 1.4vmin, 1.2rem); font-weight: bold; cursor: pointer;
        }
        .btn-preset:active { background: var(--aka); }

        #timer {
            font-family: 'Courier New', monospace; font-weight: 900;
            background: #000; padding: 0.4em 0.5em; border-radius: 8px; border: 1px solid #333;
            line-height: 1; white-space: nowrap;
            display: flex; align-items: center; justify-content: center; gap: 2px;
            color: white;
            transition: color 0.2s;
        }
        #timer.running { color: #ffeb3b; }
        #timer.warning { color: #f44336; }

        .timer-digit-col {
            display: flex; flex-direction: column; align-items: center; gap: 1px;
        }
        .timer-main-digits {
            display: flex; align-items: center; gap: 2px;
        }
        .t-num {
            font-size: min(6rem, 16cqw, 9vmin);
            line-height: 1;
        }
        .t-colon {
            font-size: min(6rem, 16cqw, 9vmin);
            line-height: 1; align-self: center;
        }
        .t-cs {
            font-size: min(2rem, 5cqw, 3vmin);
            align-self: flex-end; margin-bottom: 0.1em; opacity: 0.85;
        }
        .t-arrow {
            background: none; border: none; color: inherit;
            font-size: min(1rem, 2.5cqw, 1.5vmin);
            cursor: pointer; opacity: 0.6; padding: 0 4px; line-height: 1;
            transition: opacity 0.15s;
            user-select: none;
        }
        .t-arrow:hover { opacity: 1; }
        .t-arrow:active { opacity: 0.4; }
        .center-panel { container-type: inline-size; }

        .timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 90%; }
        .progress-bar {
            position: relative;
            width: 100%; height: clamp(6px, 1vmin, 12px);
            background: linear-gradient(90deg, var(--aka), #ffeb3b 40%, #4caf50);
            border: 1px solid #333; border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute; top: 0; right: 0; bottom: 0;
            width: 0%;
            background: #000;
            transition: width 0.3s linear;
        }

        .btn-main {
            width: 90%; padding: clamp(10px, 2vmin, 22px); border-radius: 6px;
            border: none; background: var(--aka); color: white;
            font-weight: 900; font-size: clamp(1rem, 2.2vmin, 2rem); cursor: pointer;
        }

        .flags-box { display: flex; gap: 12px; }
        .flag { width: 38px; height: 28px; border: 2px solid #444; border-radius: 3px; opacity: 0.2; cursor: pointer; }
        .flag.red { background: #ff0000; }
        .flag.white { background: #ffffff; }
        .flag.active { opacity: 1; border-color: #ffeb3b; box-shadow: 0 0 10px rgba(255,235,59,0.5); }

        .side { overflow: hidden; min-height: 0; }

        /* MODAL TIEMPO */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.82);
            z-index: 9999;
            align-items: center; justify-content: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal-box {
            background: #1a1a1a;
            border: 3px solid var(--aka);
            border-radius: 14px;
            padding: clamp(24px, 5vmin, 60px) clamp(32px, 8vmin, 90px);
            text-align: center;
            box-shadow: 0 0 60px rgba(204,0,0,0.5);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .modal-title {
            font-size: clamp(2.5rem, 9vmin, 7rem);
            font-weight: 900; letter-spacing: 4px;
            color: #ffeb3b;
            text-shadow: 0 0 30px rgba(255,235,59,0.6);
        }
        .modal-sub {
            font-size: clamp(0.9rem, 2.5vmin, 2rem);
            color: #aaa; margin-top: 8px; letter-spacing: 2px;
        }
        .modal-btn {
            margin-top: clamp(16px, 3vmin, 36px);
            padding: clamp(10px, 2vmin, 22px) clamp(28px, 6vmin, 70px);
            background: var(--aka); color: white;
            border: none; border-radius: 8px;
            font-size: clamp(1rem, 2.5vmin, 2rem); font-weight: 900;
            cursor: pointer; letter-spacing: 1px;
        }
        .modal-btn:active { opacity: 0.7; }

        /* HORIZONTAL CORTO (móvil landscape) */
        @media (orientation: landscape) and (max-height: 500px) {
            .score-val { font-size: min(22vh, 18vmin); margin-bottom: 4px; }
            .btn-p { padding: 4px 2px; font-size: 0.85rem; }
            .btn-p small { font-size: 0.5rem; }
            .faults { margin-top: 4px; gap: 4px; }
            .fault { width: 18px; height: 18px; }
            .senshu { width: 24px; height: 24px; font-size: 0.55rem; top: 4px; }
            .btn-group { max-width: 200px; gap: 4px; }
            .center-panel { padding: 2px; justify-content: space-between; gap: 2px; }
            .center-panel { overflow-y: auto; }
            .btn-preset { padding: 3px 0; font-size: 0.55rem; }
            .btn-main { padding: 6px; font-size: 0.85rem; }
            #timer { padding: 0.25em 0.5em; }
            .t-num { font-size: min(4rem, 10cqw, 7vh); }
            .t-colon { font-size: min(4rem, 10cqw, 7vh); }
            .t-cs { font-size: min(1.4rem, 4cqw, 2.5vh); }
            .t-arrow { font-size: min(0.7rem, 1.8cqw, 1.2vh); }
            .progress-bar { height: 5px; }
            .flags-box { gap: 6px; }
            .flag { width: 26px; height: 18px; }
        }

        /* MODO VERTICAL */
        @media (max-width: 768px) and (orientation: portrait) {
            .board { grid-template-columns: 1fr; grid-template-rows: auto 1fr 1fr; }
            .center-panel { grid-row: 1; flex-direction: row; flex-wrap: wrap; height: auto; gap: 5px; }
            .time-presets { width: 48%; order: 1; }
            .timer-wrap { width: 48%; order: 2; gap: 4px; }
            #timer { width: auto; padding: 0.3em 0.5em; }
            .t-num { font-size: 1.8rem; }
            .t-colon { font-size: 1.8rem; }
            .t-cs { font-size: 0.9rem; }
            .btn-main { width: 100%; order: 3; margin-top: 2px; padding: 8px; font-size: 1rem; }
            .side { flex-direction: row; justify-content: space-around; }
            .score-val { font-size: 5rem; margin: 0; }
            .btn-group { grid-template-columns: repeat(4, 1fr); width: auto; }
            .flags-box { display: none; }
            .aka .senshu, .ao .senshu,
            .board.swapped .aka .senshu, .board.swapped .ao .senshu { left: 8px; right: auto; }
            .side { flex-wrap: wrap; align-items: center; }
            .faults { width: 100%; justify-content: center; order: 99; margin-top: 4px; }
        }
    </style>
</head>

    <script>
        let scores = { aka: 0, ao: 0 };
        // timeLeft en centésimas (1/100 seg)
        let timeLeft = 12000;
        let timeTotal = 12000;
        let timerRunning = false;
        let interval = null;
        let warnedAt15 = false;
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playHorn(startTime, duration, freq, vol = 1.0) {
            try {
                const ctx = getAudioCtx();
                const t = startTime;

                // Onda principal: sawtooth (timbre de bocina)
                const osc1 = ctx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = freq;

                // Segunda armónica para cuerpo
                const osc2 = ctx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.value = freq * 1.5;

                // Distorsión suave
                const wave = ctx.createWaveShaper();
                const curve = new Float32Array(256);
                for(let i = 0; i < 256; i++) {
                    const x = (i * 2) / 256 - 1;
                    curve[i] = (Math.PI + 80) * x / (Math.PI + 80 * Math.abs(x));
                }
                wave.curve = curve;

                const gain1 = ctx.createGain();
                const gain2 = ctx.createGain();
                const master = ctx.createGain();

                osc1.connect(gain1); gain1.connect(wave);
                osc2.connect(gain2); gain2.connect(wave);
                wave.connect(master);
                master.connect(ctx.destination);

                gain1.gain.value = 0.7;
                gain2.gain.value = 0.3;

                // Envelope: ataque rápido, sustain, caída brusca
                master.gain.setValueAtTime(0, t);
                master.gain.linearRampToValueAtTime(vol, t + 0.03);
                master.gain.setValueAtTime(vol, t + duration - 0.08);
                master.gain.linearRampToValueAtTime(0, t + duration);

                osc1.start(t); osc1.stop(t + duration);
                osc2.start(t); osc2.stop(t + duration);
            } catch(e) {}
        }

        function playWarning() {
            const ctx = getAudioCtx();
            const now = ctx.currentTime;
            playHorn(now, 0.5, 520, 0.85);
            playHorn(now + 0.65, 0.5, 520, 0.85);
        }

        function playEnd() {
            const ctx = getAudioCtx();
            const now = ctx.currentTime;
            playHorn(now, 0.6, 440, 1.0);
            playHorn(now + 0.75, 0.6, 440, 1.0);
            playHorn(now + 1.5, 1.2, 480, 1.0);
        }

            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('b-'+p).classList.add('active');
            if(p === 'history') renderHistory();
        }

        function updateP(s, v) {
            scores[s] = Math.max(0, scores[s] + v);
            document.getElementById('s-'+s).textContent = scores[s];
        }

        function setT(s) {
            if(timerRunning) stopTimer();
            timeLeft = s * 100;
            timeTotal = s * 100;
            warnedAt15 = false;
            renderTime();
            updateTimerColor();
        }

        function adjustTime(unitSec, delta) {
            if(timerRunning) return;
            timeLeft = Math.max(0, timeLeft + unitSec * delta * 100);
            timeTotal = Math.max(timeTotal, timeLeft);
            if(timeLeft > timeTotal) timeTotal = timeLeft;
            warnedAt15 = false;
            renderTime();
        }

        function stopTimer() {
            clearInterval(interval);
            interval = null;
            timerRunning = false;
            const btn = document.getElementById('t-ctrl');
            btn.textContent = "START";
            btn.style.background = "var(--aka)";
            updateTimerColor();
        }

        function toggleTimer() {
            // Desbloquear AudioContext en interacción de usuario
            try { getAudioCtx().resume(); } catch(e) {}

            const btn = document.getElementById('t-ctrl');
            if(timerRunning) {
                stopTimer();
            } else {
                if(timeLeft <= 0) return;
                btn.textContent = "STOP";
                btn.style.background = "#555";
                timerRunning = true;
                updateTimerColor();
                const TICK = 50; // ms por tick (2 centésimas)
                interval = setInterval(() => {
                    timeLeft = Math.max(0, timeLeft - Math.round(TICK / 10));
                    renderTime();
                    updateTimerColor();
                    if(timeLeft <= 1500 && !warnedAt15) {
                        warnedAt15 = true;
                        playWarning();
                    }
                    if(timeLeft <= 0) {
                        clearInterval(interval);
                        interval = null;
                        timerRunning = false;
                        btn.textContent = "START";
                        btn.style.background = "var(--aka)";
                        updateTimerColor();
                        saveMatch();
                        playEnd();
                        setTimeout(() => document.getElementById('modal-tiempo').classList.add('visible'), 2800);
                    }
                }, TICK);
            }
        }

        function updateTimerColor() {
            const el = document.getElementById('timer');
            el.classList.remove('running', 'warning');
            if(timerRunning) {
                if(timeLeft <= 1500) {
                    el.classList.add('warning');
                } else {
                    el.classList.add('running');
                }
            }
        }

        function renderTime() {
            const totalSec = Math.floor(timeLeft / 100);
            const cs = timeLeft % 100;
            const m = Math.floor(totalSec / 60).toString().padStart(2,'0');
            const s = (totalSec % 60).toString().padStart(2,'0');
            document.getElementById('t-min').textContent = m;
            document.getElementById('t-sec').textContent = s;
            document.getElementById('t-cs').textContent = '.' + cs.toString().padStart(2,'0');
            const pct = timeTotal > 0 ? Math.max(0, (timeLeft / timeTotal) * 100) : 0;
            document.getElementById('progress').style.width = (100 - pct) + '%';
        }

        function saveMatch() {
            const h = JSON.parse(localStorage.getItem('kazoku_final_log') || "[]");
            h.unshift({ t: new Date().toLocaleTimeString(), aka: scores.aka, ao: scores.ao });
            localStorage.setItem('kazoku_final_log', JSON.stringify(h));
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('kazoku_final_log') || "[]");
            document.getElementById('h-list').innerHTML = h.map(m => `
                <div style="background:#222; padding:12px; margin-bottom:8px; border-left:5px solid var(--aka); display:flex; justify-content:space-between; border-radius:4px;">
                    <span style="color:#888; font-size:0.8rem;">${m.t}</span>
                    <b style="font-size:1.1rem;">AKA ${m.aka} - AO ${m.ao}</b>
                </div>
            `).join('') || '<p style="text-align:center; color:#555;">No hay registros aún.</p>';
        }

        function resetMatch() {
            if(confirm("¿Reiniciar tablero para una nueva pelea?")) {
                if(scores.aka > 0 || scores.ao > 0) saveMatch();
                scores = {aka:0, ao:0};
                document.getElementById('s-aka').textContent = 0;
                document.getElementById('s-ao').textContent = 0;
                document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
                document.querySelectorAll('.senshu').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.fault').forEach(f => f.classList.remove('active'));
                ['f-aka','f-ao'].forEach(id => document.getElementById(id).dataset.lvl = '0');
            }
        }

        function setFault(side, lvl) {
            const dots = document.querySelectorAll('#f-'+side+' .fault');
            const current = parseInt(document.getElementById('f-'+side).dataset.lvl || '0');
            const next = (current === lvl) ? lvl - 1 : lvl;
            document.getElementById('f-'+side).dataset.lvl = next;
            dots.forEach(d => {
                const dl = parseInt(d.dataset.lvl);
                d.classList.toggle('active', dl <= next);
            });
        }

        function toggleFullscreen() {
            const btn = document.getElementById('btn-fullscreen');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(() => {});
                    }
                    btn.classList.add('active');
                }).catch(() => {});
            } else {
                document.exitFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.unlock) {
                        try { screen.orientation.unlock(); } catch(e) {}
                    }
                    btn.classList.remove('active');
                });
            }
        }

        document.addEventListener('fullscreenchange', () => {
            document.getElementById('btn-fullscreen').classList.toggle('active', !!document.fullscreenElement);
        });

        function toggleSenshu(side) {
            const el = document.getElementById('senshu-'+side);
            const other = document.getElementById('senshu-'+(side === 'aka' ? 'ao' : 'aka'));
            if(el.classList.contains('active')) {
                el.classList.remove('active');
            } else {
                el.classList.add('active');
                other.classList.remove('active');
            }
        }

        function closeModal() {
            document.getElementById('modal-tiempo').classList.remove('visible');
        }

        let sidesSwapped = false;

        function swapSides() {
            const board = document.querySelector('.board');
            const aka = document.querySelector('.side.aka');
            const ao = document.querySelector('.side.ao');
            const center = document.querySelector('.center-panel');
            sidesSwapped = !sidesSwapped;
            board.classList.toggle('swapped', sidesSwapped);
            board.innerHTML = '';
            if(sidesSwapped) {
                board.appendChild(ao);
                board.appendChild(center);
                board.appendChild(aka);
            } else {
                board.appendChild(aka);
                board.appendChild(center);
                board.appendChild(ao);
            }
        }

        // Scroll del mouse sobre minutos o segundos
        document.getElementById('t-min').addEventListener('wheel', e => {
            e.preventDefault();
            if(timerRunning) return;
            adjustTime(60, e.deltaY < 0 ? 1 : -1);
        }, { passive: false });

        document.getElementById('t-sec').addEventListener('wheel', e => {
            e.preventDefault();
            if(timerRunning) return;
            adjustTime(1, e.deltaY < 0 ? 1 : -1);
        }, { passive: false });

        // Inicializar display
        renderTime();
    </script>
</body>
</html>
